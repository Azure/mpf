# yaml-language-server: $schema=https://taskfile.dev/schema.json
# docs: https://taskfile.dev
---
version: "3"

vars:
  RUNTIME_VERSION:
    map:
      uv: 0.11.16
      fnm: 1.39.0
      pwsh: 7.6.2
      golang: 1.26.3
  RUNTIME_INSTALLER_SHA:
    map:
      fnm: bfb186034978b1ddaf87501eb1633bdc42a5c0a6 # 2026-03-09 Schniz/fnm .ci/install.sh
  RUNTIME_SHA256:
    map:
      pwshLinuxX64: 6cbcfbf20e376aa62ffd91c973493c41a7a52ddfd5a5db3ff9bc12f0d0fe9292
      pwshLinuxArm64: a8d4e386dfafda385d0604045eed03ce6f3a843d45fc8f0b9588b836ca17cdb8
      pwshOsxX64: 3ce51ba39fd3c816212866ea461d582d69c5c9c3d35a1fd6cd789d23803758a2
      pwshOsxArm64: 4b10e8a8e3dba067cf68c09bd92ee137ccac00b7c05ed31a0ae136309ef107b6
  PYTHON_VERSION:
    sh: |
      [ -f .python-version ] && cat .python-version || echo "3.14"
  NODE_VERSION:
    sh: |
      [ -f .node-version ] && cat .node-version || echo "24"

tasks:
  init:node:
    desc: Initialize Node.js environment
    cmds:
      - fnm install --progress never "{{.NODE_VERSION}}"
      - cmd: |
          eval "$(fnm env --shell bash)"
          fnm use --silent-if-unchanged --install-if-missing "{{.NODE_VERSION}}"
          fnm default "{{.NODE_VERSION}}"
        platforms: [linux]
      - cmd: |
          eval "$(fnm env --shell zsh)"
          fnm use --silent-if-unchanged --install-if-missing "{{.NODE_VERSION}}"
          fnm default "{{.NODE_VERSION}}"
        platforms: [darwin]
      - cmd: |
          {{.PWSH}} '
            fnm env --shell powershell | Out-String | Invoke-Expression;
            fnm use --silent-if-unchanged --install-if-missing "{{.NODE_VERSION}}";
            fnm default "{{.NODE_VERSION}}"
          '
        platforms: [windows]
    dir: "{{.ROOT_DIR}}"

  init:python:
    desc: Initialize Python environment
    cmds:
      - uv python install --default "{{.PYTHON_VERSION}}" --preview-features python-install-default
      - uv python update-shell
    dir: "{{.ROOT_DIR}}"

  setup:uv:
    desc: uv setup
    cmds:
      - cmd: |
          ./scripts/setup_uv.sh "{{.RUNTIME_VERSION.uv}}"
        platforms: [linux]
      - task: :internal:_install:brew
        vars:
          APP: uv@{{.RUNTIME_VERSION.uv}}
      - task: :internal:_install:winget
        vars:
          APP: astral-sh.uv
          VERSION: "{{.RUNTIME_VERSION.uv}}"
    dir: "{{.TASKFILE_DIR}}"

  setup:fnm:
    desc: fnm setup
    cmds:
      - cmd: |
          INSTALLER_SHA="{{.RUNTIME_INSTALLER_SHA.fnm}}" ./scripts/setup_fnm.sh "{{.RUNTIME_VERSION.fnm}}"
        platforms: [linux]
      - task: :internal:_install:brew
        vars:
          APP: fnm@{{.RUNTIME_VERSION.fnm}}
      - task: :internal:_install:winget
        vars:
          APP: Schniz.fnm
          VERSION: "{{.RUNTIME_VERSION.fnm}}"
    dir: "{{.TASKFILE_DIR}}"

  setup:pwsh:
    desc: pwsh setup
    cmds:
      - cmd: |
          sudo env PWSH_SHA256_LINUX_X64="{{.RUNTIME_SHA256.pwshLinuxX64}}" PWSH_SHA256_LINUX_ARM64="{{.RUNTIME_SHA256.pwshLinuxArm64}}" ./scripts/setup_pwsh.sh "{{.RUNTIME_VERSION.pwsh}}"
        platforms: [linux]
      - cmd: |
          PWSH_SHA256_OSX_X64="{{.RUNTIME_SHA256.pwshOsxX64}}" PWSH_SHA256_OSX_ARM64="{{.RUNTIME_SHA256.pwshOsxArm64}}" ./scripts/setup_pwsh.sh "{{.RUNTIME_VERSION.pwsh}}"
        platforms: [darwin]
      - task: :internal:_install:winget
        vars:
          APP: Microsoft.PowerShell
          VERSION: "{{.RUNTIME_VERSION.pwsh}}"
    dir: "{{.TASKFILE_DIR}}"

  setup:golang:
    desc: golang setup
    cmds:
      - cmd: |
          ./scripts/setup_golang.sh "{{.RUNTIME_VERSION.golang}}"
        platforms: [linux]
      - task: :internal:_install:brew
        vars:
          APP: golang@{{.RUNTIME_VERSION.golang}}
      - task: :internal:_install:winget
        vars:
          APP: GoLang.Go
          VERSION: "{{.RUNTIME_VERSION.golang}}"
    dir: "{{.TASKFILE_DIR}}"

  # * Setup
  setup:
    desc: Setup Runtime environments
    vars:
      ITEMS:
        - golang
        - uv
        - fnm
        - pwsh
    cmds:
      - for: { var: ITEMS }
        task: setup:{{.ITEM}}
