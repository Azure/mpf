# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: 🧪 v2-arm-bicep-e2e

# This workflow jobs never run. arm-bicep-e2e-v2.yaml runs ARM/Bicep e2e tests
# when a PR is added to the merge queue (before merge to main).
# This workflow is a workaround as mentioned in the discussion linked below.
# Merge Group Discussions: https://github.com/orgs/community/discussions/51120
on:
  pull_request:

permissions: {}

jobs:
  testarmbicepe2e:
    if: false # https://github.com/orgs/community/discussions/51120
    name: 🧪 Run ARM Bicep e2e Tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: ⤵️ Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
