# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: 🧪 E2E Terraform

# This GitHub action runs your tests before merging a pull request via merge groups
# Merge Group Discussions: https://github.com/orgs/community/discussions/51120
on:
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: 0 22 * * *

concurrency:
  group: terraform_e2e_workflow_group

permissions: {}

jobs:
  test-e2e-terraform:
    if: github.event_name != 'pull_request'
    name: 🧪 Terraform E2E Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
    steps:
      - name: ⤵️ Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🚧 Setup Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 🚧 Setup Task
        uses: go-task/setup-task@0ab1b2a65bc55236a3bc64cde78f80e20e8885c2 # v1.0.0

      - name: 🔀 Download Go dependencies
        run: task deps:download

      - name: 🔨 Setup Test tools
        run: task test:tools

      - name: 🚧 Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_wrapper: false
          terraform_version: latest

      - name: 🔓 Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_OID_CLIENT_ID }}
          tenant-id: ${{ secrets.MPF_TENANTID }}
          subscription-id: ${{ secrets.MPF_SUBSCRIPTIONID }}

      - name: 🧪 Run Terraform E2E Tests
        run: task teste2e:terraform
        env:
          MPF_SUBSCRIPTIONID: ${{ secrets.MPF_SUBSCRIPTIONID }}
          MPF_TENANTID: ${{ secrets.MPF_TENANTID }}
          MPF_SPCLIENTID: ${{ secrets.MPF_TERRAFORM_SPCLIENTID }}
          MPF_SPCLIENTSECRET: ${{ secrets.MPF_TERRAFORM_SPCLIENTSECRET }}
          MPF_SPOBJECTID: ${{ secrets.MPF_TERRAFORM_SPOBJECTID }}

      - name: 🧪 Run Terraform CLI Tests
        run: task testcli:terraform
        env:
          MPF_SUBSCRIPTIONID: ${{ secrets.MPF_SUBSCRIPTIONID }}
          MPF_TENANTID: ${{ secrets.MPF_TENANTID }}
          MPF_SPCLIENTID: ${{ secrets.MPF_TERRAFORM_SPCLIENTID }}
          MPF_SPCLIENTSECRET: ${{ secrets.MPF_TERRAFORM_SPCLIENTSECRET }}
          MPF_SPOBJECTID: ${{ secrets.MPF_TERRAFORM_SPOBJECTID }}
