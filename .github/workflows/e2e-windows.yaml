# yaml-language-server:
# $schema=https://www.schemastore.org/github-workflow.json
---
name: 🧪 E2E Windows

# This GitHub action runs your tests before merging a pull request via merge groups
# Merge Group Discussions: https://github.com/orgs/community/discussions/51120
on:
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: 0 19 * * *

concurrency:
  group: windows_e2e_workflow_group

permissions: {}

jobs:
  test-e2e-windows:
    if: github.event_name != 'pull_request'
    name: 🧪 E2E Tests (Windows)
    runs-on: windows-2025
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        type: [arm, bicep, terraform]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: ⤵️ Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 🚧 Setup Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c
        with:
          go-version-file: go.mod
          cache: true

      - name: 🚧 Setup Task
        uses: go-task/setup-task@0ab1b2a65bc55236a3bc64cde78f80e20e8885c2 # v1.0.0

      - name: 🔀 Download Go dependencies
        run: task deps:download

      - name: 🔨 Setup Test tools
        run: task test:tools

      - name: Install Bicep
        if: matrix.type == 'bicep'
        shell: powershell
        run: |
          # Download and install Bicep for Windows
          $bicepUrl = "https://github.com/Azure/bicep/releases/latest/" +
            "download/bicep-win-x64.exe"
          $bicepPath = "C:\Program Files\Azure Bicep CLI"
          $bicepExe = "$bicepPath\bicep.exe"

          # Create directory if it doesn't exist
          New-Item -ItemType Directory -Force -Path $bicepPath | Out-Null

          # Download Bicep
          Invoke-WebRequest -Uri $bicepUrl -OutFile $bicepExe

          # Add to PATH for this session
          $env:PATH += ";$bicepPath"
          echo "$bicepPath" | Out-File -FilePath $env:GITHUB_PATH `
            -Encoding utf8 -Append

          # Verify installation
          & $bicepExe --version

      - name: 🚧 Setup Terraform
        if: matrix.type == 'terraform'
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd
        with:
          terraform_wrapper: false
          terraform_version: latest

      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_OID_CLIENT_ID }}
          tenant-id: ${{ secrets.MPF_TENANTID }}
          subscription-id: ${{ secrets.MPF_SUBSCRIPTIONID }}

      - name: 🧪 Run ${{ matrix.type }} CLI Tests
        shell: powershell
        run: task testcli:${{ matrix.type }}
        env:
          MPF_SUBSCRIPTIONID: ${{ secrets.MPF_SUBSCRIPTIONID }}
          MPF_TENANTID: ${{ secrets.MPF_TENANTID }}
          MPF_SPCLIENTID: ${{ secrets.MPF_WINDOWS_SPCLIENTID }}
          MPF_SPCLIENTSECRET: ${{ secrets.MPF_WINDOWS_SPCLIENTSECRET }}
          MPF_SPOBJECTID: ${{ secrets.MPF_WINDOWS_SPOBJECTID }}

  check-e2e-windows:
    if: always()
    name: 🧪 Check E2E Tests (Windows)
    needs: test-e2e-windows
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: ✅ OK
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: 🛑 Failure
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
